<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <div class="texto-imagem">
                    <h2>Olá, Bem-vindo!</h2>
                    <p>Entre na sua conta para continuar</p>
                </div>
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <form action="login.php" method="post">
                    <div class="campo">
                        <span class="material-symbols-outlined icone">person</span>
                        <input type="email" name="login" id="ilogin" placeholder="Nome de usuário ou e-mail" required>
                    </div>
                <div class="campo">
                    <span class="material-symbols-outlined icone">lock</span>
                    <input type="password" name="senha" id="isenha" placeholder="Senha" required>
                </div>
                <div class="opcoes">
                <label>
                    <input type="checkbox"> Lembrar senha
                </label>
                    <a href="esqueci.html">Esqueci a senha</a>
                </div> 
                <br> <br>
                <input type="submit" value="Entrar" class="botao-login">
                <p class="criar-conta">
                    Não tem uma conta? <a href="cadastro.html">Criar conta</a>
                </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
